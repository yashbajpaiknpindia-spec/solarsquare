# ─────────────────────────────────────────────────────────────────────────────
# render.yaml  —  Sol Grid India  |  Single Web Service + PostgreSQL
#
# Deploy steps:
#   1. Push this repo to GitHub / GitLab.
#   2. In Render Dashboard → New → Blueprint → connect your repo.
#   3. Render auto-reads this file and creates the service + DB.
#   4. Set the following env vars manually in the Render dashboard
#      (marked sync: false below):
#        • ADMIN_TOKEN        — any strong secret (e.g. openssl rand -hex 32)
#        • VITE_GA_MEASUREMENT_ID — e.g. G-XXXXXXXXXX  (optional)
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: solgrid-india
    runtime: node
    region: singapore        # closest to India; change to oregon if you prefer
    plan: free               # upgrade to starter ($7/mo) for always-on

    # ── Build ──────────────────────────────────────────────────────────────
    buildCommand: npm install && npm run build

    # ── Start ──────────────────────────────────────────────────────────────
    startCommand: node server/index.js

    # ── Health check ───────────────────────────────────────────────────────
    healthCheckPath: /api/health

    # ── Auto-deploy on push ────────────────────────────────────────────────
    autoDeploy: true

    # ── Environment variables ──────────────────────────────────────────────
    envVars:
      - key: NODE_ENV
        value: production

      # DATABASE_URL is auto-injected from the database below
      - key: DATABASE_URL
        fromDatabase:
          name: solgrid-db
          property: connectionString

      # Set this in Render dashboard → Environment → Secret Files / Env Vars
      - key: ADMIN_TOKEN
        sync: false          # do NOT commit; set manually in Render dashboard

      # Google Analytics 4 Measurement ID (e.g. G-XXXXXXXXXX)
      # Vite embeds this at build time via index.html %VITE_GA_MEASUREMENT_ID%
      - key: VITE_GA_MEASUREMENT_ID
        sync: false          # set in Render dashboard, leave blank to disable GA

# ─────────────────────────────────────────────────────────────────────────────
databases:
  - name: solgrid-db
    plan: free               # 1 GB storage, 90-day retention on free tier
    databaseName: solgrid
    user: solgrid
    region: singapore        # must match the web service region
